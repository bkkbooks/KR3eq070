front:
  text: 孫序醫小道也有至理存焉明其理及能精其術善守古方膠執己見皆非也濠湖華劬生茂才以通儒為良醫學識優長經驗豐富善於此道三折肱者近著醫話一册將其平生所得筆之於書以諗來者復反覆指示百端取譬盡人應有之知識卻無人能道其詳間述名醫庸醫各節尤足為後生法戒他日梓行後俾家置一編即為病家醫家之常識也可庚午中秋八八叟孫魁識於擁書軒自序吾國醫術自軒岐而後代有名人著述宏富學者畢生不能卒其業振自弱冠後始涉獵及之家藏而外復假諸友人得稍窺其門徑旋由族人介紹受業子北範席君育先師之門先師不以振為不肖立案立方往往俯有所商徒以處境艱窘未獲久侍函丈良以為憾應診之始每診一病輒為查核古方推闡病象仿徨終夜休息未遑逮再診奏效始釋重負倘或不治等於剚刃深自引咎迄今三十年矣事以經過而知難言以有徵而益信回首前塵庸有一得謹就追憶所及拉雜記之對於細微之事古人所不道良工之易忽者尤加詳焉若夫精微之學深奧之理有古籍在非振所敢贅也名之曰醫話等諸尋常之談話云爾中華民國十九年秋月鵝湖劬生華國振記
