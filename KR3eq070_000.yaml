body:
  text: 留香館醫話先君子喜讀稗官野史而尤好醫術然未嘗為人治病也先慈多産體弱中年善病病急時則邀查家橋錢子裕先生診視一二劑後先君子輒自調之錢公常許其精細勸之應診先君子以生命所關終弗敢也父子性相近振之好讀醫書殆得之遺傳性耳醫者意也凡治一病對於天時之寒暖人事之勞逸體格之強弱年齡之老少病前之飲食起居平素之有無宿恙一一皆當推究以意融會之自能得其病根之所在經云治病必求其本本者病根之謂也再參以所現之症象望其色以知其陰陽聽其聲以辨其虛實按其腹以驗其垢察及頸項胸膺以探其疹㾦視其唇舌齒齦以究其津液之枯潤及虛熱實火之表現以意融會之自有的對之方得於心應於手按部就班勿急於圖功勿緩以誤事當機立斷自有左右逢源之樂若徒恃方書所云某方治某病某藥入某經按圖索驥膠柱鼓瑟未有不僨事者醫學與科學同無止境也古人方書汗牛充棟學者每興望洋之感則莫如擇要而讀焉內經難經金匱傷寒論如儒書之六經不可不讀也四大家各有所偏然當時所治皆效無所謂偏也學者慎勿是甲非乙以今議古惟陳修園張景嶽二氏自信太深未免拘執讀者須斟酌焉大部醫書則證治準繩張氏醫通醫宗金鑑等選讀其一可也夫科學新理日出故書籍以愈近者為佳醫書亦猶是也或發明新義或兼參西法學者宜博採並觀焉醫案則參考書也三家醫案高難學步臨證指南駁而不純豫所見者階柳選四家醫案為最合時宜之名構方案皆當時原本不加雕琢置之案頭亦一良導師也經云熱病者傷寒之類也而於是著書立説者無不重視傷寒一門近代時流幾舉六淫之病無不以傷寒目之而其實傷寒熱病迥然不同以喻西昌醫律之精尚不知溫熱病為何物強引內經之文分為三大綱寧知古今有印板之書安有印板之病泥古不化死於溫熱者必多自葉天士氏溫熱論出學者始有所宗繼起者無慮數十家而死於溫熱者始鮮葉氏真軒岐之功臣仲景之高足也仲景之書傷寒金匱而外更有卒病論惜古籍云亡遂令後人對於猝暴之病無所適從唐宋元明以來闡發傷寒精義無餘蘊矣然不善用其方拘泥太甚動輒枘鑿説者遂謂古方不可以治今病置之高閣不復鑽研折中者謂用古方治今病如拆舊料改今房須經匠人斧削此言是也大江以南傷寒絶少而溫病則四時皆有在春曰春溫風溫在夏曰暑溫濕溫在秋曰秋溫伏暑疸瘧在冬曰冬溫近代三衢雷氏時病論論列綦詳大可師法其它病機脈法藥性悉能納博於約要言不煩學者苟於此探索焉則學醫之道思過半矣醫師操活人之柄者也當以道德為重博愛為懷患得患失之心不可有重富輕貧之見不可存若競爭心嫉妒心不負責任心尤當切戒者也中心但然注全神於病人之身自然不入岐路若審症不甚分明治法毫無把握寧知難而退萬勿敷衍塞責延宕貽誤致犯庸醫殺人之戒醫術關乎生命豈可與工商諸業藉圖糊口者比哉學佛者必損衆生知見佛見法見皆須掃蕩而空之無見之見乃為真見楞嚴經所謂見非見也學醫者亦然讀古人書須食而化之若以之橫梗胸中則學東垣者偏於補中學丹溪者偏於滋陰學河間子和者偏於清瀉在古人當時對病發藥既無隨人俯仰之心亦無矯在過正之見今人讀其書而不能通其意遂目之為偏或者拾其唾餘矜為心得握管在手牽強附會為古人之奴隸窒一己之性靈此所謂削足以就屢耳安望其批邵導窾遊刃有餘哉方書之金木水火猶代數之甲乙丙丁也代數之字可以變更改甲乙丙丁為愛皮西提可也改阿伊烏哀亦無不可吾國狃於生克之説牢不可破隔二隔三之治穿鑿附會雖謂續貂無益治療徒滋聚訟學者於此等處須拿定主意勿為所淆對病立方要知化學方程式五雀六燕銖兩悉稱方為愜心之作若拘泥於生克則必有勉強湊合之處矣病有病名認定病名則提綱攣領向的發矢自無錯誤喻氏先議病後論藥可宗也若病情錯雜似是而非不能斷定其為何病者盲人瞎馬行不得也哥哥醫者遇此不如婉言謝之勉強開方斷無一效者也不為良相便為良醫範文正以生人為心其心良則無往而非良也心者生命之原也心可以離形而獨立形不可離心而生存儒家所謂放之則彌六合卷之則退藏於密者也內典三藏十二部無非發明心之體心之量也試以月喻之舉頭所望之月月體也大地所照之光月量也月體不變月量無盡心亦猶是曰性曰魂曰靈一物而異名也一念未起之時聖賢與盜跖無殊也及其既起善惡判焉人苟能以範文正之心為心則不論操何柄營何事亦無往而不良矣獨醫事云乎哉讀古人書不能瞭解其義姑置之一二月再讀再不解仍置之或多讀古書當有互相發明之處觸類旁通心領神會試再讀其書如破竹然一節之後迎刃解矣古人讀書之暇方讀醫書今人讀書不成改習醫業以醫為啖飯之計而醫術於是卑矣夫醫掌生殺之柄必有生人之仁殺人之膽而後可以言醫其殺人也審病未確輕進圖功生之之心太切而反以殺之此偶然之誤初學者所難免但既誤矣不自引咎巧言文過則醫術何由而進必也凜凜於心常如臨深履薄審之再三千確萬確然後放膽用藥自能絲絲入筘設誤於前而惕於後從此膽小如鼠藥不輕投方務減削一味敷衍養成重病此張路玉所謂庸醫不能生人亦不能殺人而終至於殺人者是也治外感病如良將治軍除暴安良務使邊無寇驚野無伏莽而其職在靖治內傷病如良相治國舉賢任能務使陰陽調和閻閻安堵而其職在平用藥如用兵選藥如選將漢高祖善將知將性也名醫善定方知藥性也善用兵者能審敵情知已知彼百戰百勝善治病者能識病情辨症投藥百藥百效然有審症無誤用藥不謬而藥不奏效者何也非藥不道地而羼偽藥即煎不合法而失藥性耳或兩醫同治一病用藥無甚出入而一效一不效者何也此屬於病人信仰心之強弱也信仰心強者未服其藥病已去十之四五矣故醫師為人所輕視者治療不易奏功也用藥如用兵選藥如選將既如上述然兵非久練將非素信猶難操必勝之券也兵在精而不在多將在謀而不在勇用藥之法亦然非習用之藥勿好奇而輕試非必要之品弗好多而雜投君藥直搗其中堅佐使謹防其竄擾多至十二三味足矣若頭痛醫頭腳痛醫腳多多益善枝枝節節而為之則牽制既多動輒掣時安望其有成功也泥古不化者個可言兵先入為主者亦不可以言兵韓信陳背水而勝馬謖營絶處而敗一化一不化也武穆不拘兵法所向皆靡趙括徒讀父書一軍盡沒一拘成見一無成見也治病亦然有某醫青偶與之淡必曰太陽病用何藥少陽病若何治背傷寒論如數家珍聞其鄉人云初應診門庭若市經二三月求治者減十之七半年後門可羅雀矣今已改業為童子師身孔孟而口詩書道貌儼然望而知為鄉館先生也又有某醫者少年氣盛學於蘇州某名醫之門沾其空頭之習懸壺鄉里求治者踵相接出必乘轎診金轎金有定額經車棚轎不能過轎伕請先生出轎待過棚再乘先生怒斥之不得已佝僂而過焉所開方多貴品五金十金以為常藥店主以病家貧索現金病家往訴先生先生大怒將治以誤人生命之罪店主不得已許焉鄉有某氏婦患溫熱神錯譫語液涸不得汗以親戚故邀先生先生以為虛極將脫不肯開方求西醫打針亦拒之的招豫往先生與西醫異口同聲皆言不效豫為定扶液清裡辛涼透邪之劑另服全寶丹一丸神蘇熱減竟以漸愈至今其人尚健在而先生則無人過問矣此則於泥古拘執之外有虛驕之氣焉病有失表而變壞病者病雖久仍當表之鎮有廣東人士店小主某患溫病開首醫誤投鮮斛鮮地芩連等味以致表邪遏伏熱勢陡增繼一醫下之亦不效又醫以為夾陰也大溫之舌裂出血又一醫滋之口轉膩又一醫燥之病如故所邀皆鄉間著名之醫也病經四十餘日自分絶望時豫初應診其家姑邀豫往亦聊盡人事而己豫見其方厚迭如簿略翻一過見藥皆重劑於視其面癯而微紅舌微絳中有縱紋裂而出血未止聞其聲重濁而見咳嗽胸悶而脅痛切其脈細浮數方食陳米湯以冀續命豫斷其為失表而成壞病也投以辛涼輕開之劑一藥見㾦病稍差再劑㾦足然咳嗽表熱未平也再投前法參以養液三日更布㾦又三四日而更㾦凡發㾦三次豫方始終未變也後以清養調之而痊病宵失下而變危病者豫弱冠時曾患熱病病由冷浴熱浴相間且浴後當風所致故一發便重壯熱譫語口燥津枯時怙恃皆背庶祖母為邀鎮上某醫醫膽素小不敢投清瀉以致發狂液涸適錢子裕先哲應鄰家之召因邀治處方犀尖磨鮮地豆豉鮮首烏硝黃老蘇梗大劑灌下得安臥冷汗如雨黎明便暢下再劑霍然至今不敢忘錢公再造之恩也後十年豫又病秋暑氣升莫制時神識已時迷時蘇自定方倩人代書藥病相左幾致不救先師適來蕩邀診亦無效以伽楠香和雅片進氣升如故內子按豫腹堅如石乃以豬膽汁灌肛中下堅糞兩枚堅硬異常出時肛門若火灼明日乞得豬膽七八枚儘量灌之糞下乃如牛屎下後汗㾦俱得後倩先姐丈蔡望求調理而愈膽汁導法豫屢用之以救危症較洋密灌更佳因其有寒性也病有早下而變危病者河沿橋南楊姓年約四旬本濕溫病醫誤以虛痞為實脹投生軍元明粉至四劑所下皆稀薄愈下愈脹豫切脈濡數無力視其舌薄灰以指捫之潤而不燥豫投附桂以溫之茅朴以燥之救病兼救藥誤也診三次而愈有同病而體異用藥特殊於衆者某年四五月間熱病盛行投白虎透斑湯疹㾦並見乃愈鎮有老紫陽豆腐店老闆阿德者亦患熱病神昏譫語疹㾦俱見而不愈先師偕豫往診用白虎湯病轉劇繼邀豫診切其脈不鼓指口喃喃如鄭聲無片刻清醒觀其舌白膩微黃乃投桂枝茅朮等品一劑神稍蘇再劑而疹㾦布滿至無下針處後以二陳朮桂等品調之而愈生命所關當仁不讓先師亦不以為忤也葉氏曰溫邪上受首先犯肺逆傳心胞解之者曰熱傳心胞為逆熱傳胃腑為順言逆傳而順傳不煩言而明矣順傳逆傳皆有神昏譫語之象逆傳用至寶丹神犀丹紫雪牛黃清心丸等酌用手搐搦者必加羚羊角順傳按之滯在胃者以硝黃蕩滌之已入於腸則緩其制瀉葉枳實蔞仁等足矣一下之後神未了了者再下之勿餒也濕溫者濕與熱合糾結不清薛一瓢名曰濕熱熱與溫同類而異名耳或曰溫者熱之漸熱者溫之極是也或先受熱或先受濕或濕與熱同時感受治之之法必先祛其濕或風以揚之或日曝之或實土以堤之或開溝以泄之法雖不同而先祛其濕則一也祛濕之法不同當視其微甚而斟酌之不可以板法印定後人眼目也逮其化燥而清之若化不足而早清仍有後患必捫其舌已干唇燥起皮或有血痕然後清之一二劑愈矣譬如行舟遇橫風必先吃足上風一板由風順駛捷無阻礙矣鄭莊克段故縱其好勾踐沼吳先驕其主理乃通於治濕溫將軍欲以巧勝人盤馬彎弓故不發此言似之治諸溫易治濕溫難江南地卑多濕濕病最多暑邪必夾濕秋暑伏暑皆可治濕溫之法治之伏暑風雨霧露暑熱瓜果攙雜湊集最難速愈大抵體弱者其發早早發者愈速體強者其發晚晚發者愈遲其發於深秋者又兼燥氣治之合法動經匝月治不合法久延成虛多有傷生者病家認定一醫信任而委之尚易奏功若病家無主見一二劑不效輒易一醫易一醫而不易其法猶無大患設易一醫更一法轉瞬燥氣臨矣西風起矣津液漸涸以致不救者比比也可不慎哉溫熱下不嫌早濕溫下不嫌遲一實脹一虛痞也必按其腹堅而拒按矢氣頻作舌苔或黃或灰而厚者急攻之倘攻不下必求其故勿再下姑守之其食在胃腑者雖攻不下其堅在臍右者尚不可攻必待其纍纍然在臍左乃攻之則順流而下矣此言濕溫之下法也下藥硝黃力猛有毒內傷臟腑勿輕投瀉葉蔞仁枳實足矣濕溫早下則泄稀火邪易陷反增其病速化其濕濕盡燥結乃可攻溫病疏表宜辛涼銀翹散最合無汗者防風荊芥蘇藿迭加一二味濕溫疏表以蘇藿為宜豆豉亦可用必參以二陳濕甚者術朴亦可加入若分利之品則在所必用也無汗用杜藿香有汗用廣藿香下劑必加桔梗開上竅以通下竅也透㾦必佐橘絡疏肺絡以達皮毛邊溫病經旬日以外未有不發疹㾦者以邪入深也桔梗橘絡尤為必需之品一宣肺以達皮毛一疏絡以佐外布也溫病久不解非內實即內虛內實者表下兼施垢去而疹㾦透矣內虛者津傷也扶津透邪津回而皮毛潤疹㾦透矣疹㾦既透萬不可早投補品及進米麥食物恐留邪反復也必辛涼輕劑佐以清養進二三劑再定治法下後胃氣已傷熱退則不欲食者弗強食之或先進藕粉以其養胃而無補性也濕溫大忌早清必驗之於舌縱舌絳似燥手捫之仍潤者或細察之有浮膩者胸悶反復不寧者口渴不欲多飲者表熱綿綿不揚者此皆早清之咎必仍當芳香二陳等品或可加入川朴催其悉從火化然後黑膏一投疹㾦布而熱解矣時下名流往往喜清而畏溫好潤而忌燥一見患者舌尖微絳表熱熾盛不問其為溫熱濕溫鮮地石斛亂投知母石膏混用不知邪不外透煩悶轉加表熱益壯而於是手忙腳亂另請高明自圖卸責倘遇明眼人辨其病根之所在病變之由來再叩以病前之先兆重病必有先兆如天時人事皆當參考病中之經過夢中之所見實熱夢火虛寒夢墜內實夢便表寒夢雨陽盛夢飛之類多方推詳必能究出所以然之故此時須誠心負責放膽定方十可全其八九焉外實表之內實下之濕盛燥之火炎清之津枯潤之六淫之邪各有對治之方此粗知醫理者類能言之然言之非艱行之維難開手定方萬無忽略倘失表留邪變症漸起醫師慌張病家變計易醫不誤表之尚易倘再失機病必愈變幻矣或表邪未淨早投補品或自矜奏功促進飲食如斯變重皆醫之咎逮病屢變醫屢更雜藥亂投愈無把握卒至潮熱咳嗽液枯舌絳或致光剝更以重金聘請名家設投以清養寧嗽之方而於是虛勞之病成矣此徐靈胎所以以沙參麥冬為治嗽之戒品也及既成癆病家猶以為病根實深用心已盡委之天命徒喚奈何而不知皆開手一醫誤之也設遇明眼人於變症蜂起之時投以表散之方抱定主意不稍遊移則失之東隅者猶可收之桑榆也醫者安可忽於病之始起時哉兵法十則圍之倍則攻之治實熱病如遇徑敵必十倍其兵力圍而困之然必寬其一面以開其逃生之路然後迫蹙而消滅之否則困獸之鬥所傷實多治病之兼開其肺氣者寬其一面之意也大病雖解必有餘邪亦令其還從肺泄迫蹙而消滅之方無後患其治次重之病得寸進尺皆有步序此倍則攻之之意也治實病如治盜匪利用剿治虛病如治飢民利用撫治本虛標實之病如治亂民宜先剿而後撫剿撫得其宜亂未有不止者攻補得其法病未有不痊者強弱異勢攻守異形當病勢方張之時汗之不汗下之不下姑投輕劑以俟之此以守為攻之意也料敵決勝全在能審敵之虛實或正兵以圍之或奇兵以襲之垓下破楚重圍困羽此正兵也井脛攻趙輕騎易幟從治奇兵也治病亦然正治正兵也從治奇兵也曹劌論戰必攻齊氣之既衰宋襄用兵不擊楚軍於未濟一則明敵情而勝一則昧敵情而敗故善用兵者能審敵情善治病者能審病情其理一也醫必三世肱須三折醫道豈易事哉兵不嫌詐藥亦有利用詐者所謂從治之法猶兵家之詐降也古有以辛烈之藥濃煎其汁收入甘平藥中者又有作丸外殼與中心異性者此則醫術之化境矣非初學者所能學步也外感病禁食內傷病則否其禁食者何邪熱不殺穀此古訓也竊以為藥之入於胃也分布於表裡氣血全憑胃氣鼓動運化而傳達之設胃有食滯則胃力全消耗於運化食物安有餘力化藥以達病所哉堅壁清野令敵無所資亦破敵之法也內傷病則反是有胃則生無胃則死凡虛症皆然故須望其納穀以養胃氣胃氣存得一分即生命保得一分即藉食以養胃更藉胃以化藥輾轉相資如循環然故調理之法首宜注重者在胃內傷宿恙又感新邪者須速去其邪倘正氣未至極虛不可兼參補品以免掣肘所謂無糧之師利在速戰也經云緩則治其本急則治其標標病即新邪也病有正虛內結者不可下此下元虛命火衰不能腐熟水穀運行氣機耳須補其腎陽益火之原以消陰翳者是也服之似不甚效而濁陰漸化久服方見大效大便不通而自通扶陽之劑須兼補中補中之品須參入消化防其壅滯反礙胃運也經曰寒極生熱熱極生寒熱極生寒假寒也百不見一寒極生熱真熱也十病而九凡六淫之邪久必化熱秋半以後燥氣加臨始為勝氣為次寒謂燥病次於傷寒也一散即解終為復氣屬實火則非清潤滋液不可其挾伏暑者內無食滯治之尚易內有食滯則化火最易津液易涸有一二日便劫液舌乾神昏譫語者其唇必有血痕其齒必有灰垢急以大劑清瀉救之更須恣飲梨汁雪水之類以折其火以滋其液倘遲緩貽誤舌黑而短則雖有仙丹莫可挽回矣夫燥為秋氣梨為肺果燥若傷肺最宜以梨汁救之即使津液未傷亦宜加梨皮於藥中或用梨肉大抵無汗宜皮有汗宜肉液枯宜汁秋燥病夾食者多倘有汗不解不必論其日數不必拘其舌苔便當問明有無矢氣若有矢氣即投潤導雖無矢氣按其腹堅者即下之勿令化火劫液橫生枝節此豫屢治屢驗者良以燥氣消爍腸液內虧大便雖行而不暢已有積垢矣錢步云君之病即系此咎參看醫案標錢姓者即是便知共診四次案載兩方其始步云堅不肯服寒涼雲系某醫所囑經豫竭力促之始肯服翌日諸患皆平且得安臥始信豫言非謬病有假寒假熱藥有正治從治然假寒絶少假熱病則十有五焉設投涼藥而熱反熾者須防其假熱辨之之法細察舌苔絳而似干非乾者呼氣不甚熱渴欲飲冷飲一二口即止者則假熱無疑矣溫藥之過易見清藥之誤難知投清藥而效不甚著者已誤矣速改方針萬勿再投蓋清藥如陰險之小人受其害者初不明瞭及至覺察已難挽回非如溫藥之一誤即見顯而易見也病重藥輕反張邪焰病輕藥重誅伐無過過猶不及與相左之方猶五十步之笑百步耳故權衡輕重當有把握或因認病不確而姑以相試者則一劑之後必有正確之見地若仍模糊影響速謝主人勿誤病者暑邪病有表之而出冷汗或自出冷汗者弗驚也此由貪涼過度或午夜納涼或清晨涉野中霧露之邪耳以辛溫表之病有表之大汗淋漓呼呼而臥喚之不醒身冷如脫者勿驚也此正邪退之候陽不能驟復耳葉氏云膚冷經一晝夜自愈豫治張伯庭女名靈官者果如葉氏所云病家以為將脫也再邀豫往意在譏豫誤藥令豫難堪耳豫力保其無妨一肩任之為定善後之方果一晝夜而蘇腹飢索食扶之膚已溫矣調養尋愈今已出嫁生子矣六淫之病火病變幻最速殺人最易風寒暑燥諸氣久必化火變症緩而殺人亦少惟濕勝之病既少變症亦不殺人每見有兼旬經月而現如故者其症不欲食不大便胸悶而不舒神倦而嗜臥病家以其病久而不納食也必慌張無措醫家以投藥之不見功也亦心癢難搔其實濕戀於中不易化耳治之之法芳香以化之淡滲以泄之二陳苓朮穀芽等品以和之總之濕病無死法緩以調之耐心以俟之雖日久可愈也外感經旬不布疹㾦縱投疏解無效必有他故或內實或液虧或夾陰內實下之液虧養而散之至於夾陰或房後或遺精少陰著寒見症必有下列之一者方可斷定少腹痛或腰痛如折或四肢寒涼至節是也甚者反復不寧懊憹萬狀必以溫暖下焦之藥參入應用主劑之中夫夾陰非主病也或溫瘧或濕溫或其它各病必有主病可指而夾陰其兼症之一耳故蠻溫其下未必效也夾陰病老年強欲自然易犯若少壯之年雖房後即病不得便斷為夾陰不可惑於病家之言妄投溫熱設誤投之輕則發狂重則液涸而死昔年本鎮南街華梅卿暑溫夾陰壯熱有汗煩懊不寧醫投清暑之藥無效乃求治於豫按其脈濡數無力表熱雖壯神識殊清有汗溱溱舌不甚絳有薄白苔渴喜熱飲少腹及腰俱痛豫問其曾遺泄否彼頷之為定其方如下附子熟地肉桂白芍細辛麻黃瑣陽巴戟韭子車前半夏新會皮一劑汗大出疹㾦布再劑而疹㾦足三劑而表熱平後以溫養之劑調之而安不意病未復元有要事赴蘇舟車勞頓更作葉子戲通宵達旦兩夜未休而於是復病無起死回生法矣老友朱錦芳之孫名阿乖者年十七患暑溫夾食投以芳香疏化病轉劇腹撑脹而痛一夕昏厥三次四肢涼至節翌晨邀豫診伊家以曾行房決為夾陰出方二皆附桂溫劑問其曾服未云未服豫為定其方如下瀉葉枳實全瓜蔞川朴藿香青蒿桔梗半夏新會促其急煎服且宿垢大下病若失再劑愈矣此病倘無確見鮮有不誤於病象而感於病家之言者豫之抱定宗旨以夾陰病痛在少腹及腰不在當臍大腹也即痛矣不當撑脹且更無昏厥之理兼之按其腹堅硬下有矢氣其為食厥何疑食厥四肢亦冷此等似是而非之處最當細究治病之法望其色察其舌聞其聲病情已得六七矣再叩以臨病之狀態病中之經過病已得七八九而按脈以究其虛實寒熱內傷外感不過驗其脈症之相符與否而已驗舌之法前人論之已詳毋庸多贅惟已化燥未化燥濕灰干灰苔之厚薄舌質之紫絳大有分別不可忽略其有一種舌質色不絳而光剝無苔望之不潤指觸之似有津此為胃氣告竭必死縱能苟延殘喘不過稍緩時日耳舌苔與病情不符者須防其染舌如吃枇杷則苔黃服楂炭則苔黑之類豫同門羊尖周君治某甲病見黑苔誤為真也投三鮮膏連等味病幾殆翌日邀先師往診以溫劑救之得慶更生初學者於此等處須細心察之倘似燥非燥必以指捫之庶不致誤肺氣猶天氣也胃氣猶地氣也舌苔猶地面所生之草也土膚之際生氣所聚地氣平則苔薄白地氣厚內蓄垢穢則黃苔而厚甚者灰黑消之下之可也若厚黃而燥者或有裂紋者或起刺者急攻之其光剝者色絳傷胃陰滋以甘寒色不絳傷胃陽扶以甘溫舌質青紫者病必重疫症多有之須防其劇變其有胃實而苔白膩者肺有濕痰痰煉稠凝則苔有裂紋而液涸矣慎勿見苔膩而便投燥劑宅前某甲患濕溫時方黴雨連朝濕氣瀰漫視其舌白膩苔胸悶嗜臥皆濕象也時既濕勝病又濕象投以香燥病轉劇以致神昏譫語乃細按其脈數而有力按其腹堅硬實熱象也然苔仍白膩豫乃追思黴雨之前曾暴熱數日甲之病必中於是時而適發於濕盛之候舌之白膩乃新吸之黴濕也為定清瀉之方便暢疹布熱退而愈此病若見性遲純不究病前之氣候誤以神昏為濕迷則殆矣入病家而治病隨在留心或有觸機之處如見痰盂而知嗽見灰器而知吐見高枕而知氣升見敞胸而知煩悶手按其腹必氣撑眶有淚痕必多郁閉目向內者必畏日火之光旁人耳語者必有難言之隱面赤為火面青為痛面黃為濕面白陽虛麵灰色者病多危時嘆氣者氣必窒多眵者熱之徵鼻煤者熱之極其它如枕邊之食物桌上之器具或有關於病情者無一不在留神之列也傷風咳嗽輕淺病也治之也易病者多忽然六氣皆令人咳病者一例忽之遷延勿治數旬而後咳傷肺絡痰中見血見血之後病人方知著急求治醫師須認清為何氣所幹散其邪化其瘀倘見血而投止澀見嗽而投潤肺其始非不小效也而瘀血內積外邪留伏咳既不愈瘀凝成塊更感外邪則咳轉劇瘀塊陡出醫更以大清之劑遏之暫愈續發輾轉成癆以致不可救藥者我見甚多不可不戒也又有冷嗽者病由夏雨淋背寒襲肺俞而作咳逆上氣不得臥病似至危其實無妨也以小青龍湯治之無不愈者其病經三五年之老嗽遇寒即發投以小青龍亦無不愈者但不能拔其根株耳瘧每發於秋令西法謂瘧菌由蚊喙傳染繁殖於脾抽以金雞納霜殺其菌而愈豫亦常用之但必寒熱分清曾經暢汗者方無後患否則先發其汗蠲其暑濕外邪然後投之日三丸空腹吞服三日盡九丸病愈矣愈後忌食雞卵及雞雖結癖塊亦可愈其實非癖也脾臟腫耳若寒熱不分清日一至或兩至或有汗或無汗熱退而不思納食者此為類瘧與暑濕伏暑治無異也其但熱不寒者疸瘧也名瘧而實非治同溫熱葉氏治瘧不用柴胡徐氏非議之夫柴胡湯仲景以之治少陽傷寒寒熱往來症也江南無真傷寒葉氏不用必有見地若泥古不化拘牽經義治必師古倘別出新法而治愈者將責以離經叛道乎抑贊成其新法勝古乎陶淵明讀書不求甚解非不求解釋也通其大義不尚穿鑿也徐氏明達尚有拘泥之失遑論其他疸瘧之病熱病也金匱有飲食消息之文嘉言喻氏立甘寒之方以實之此則喻氏武斷之失也夫飲食消息者非治病之法乃候病之方也探其胃氣如何以斷是正瘧是瘴瘧耳大抵瘧病寒熱間斷者能食以邪不幹胃也不能食者為疸瘧熱干陽明可仿溫熱例治之不必另立方也故消息之者探其消息也痢疾古稱滯下俗名曰積積言其病根滯下言其病象也大抵中有食積不化再感暑濕醞釀而成滯遲而下不能通暢其症腹必痛裡急後重下後氣仍下注似欲再下者虛坐怒責有矢氣而無續下少傾又痛又下日夜有多至數十行者或白或紅或紅白相間膩如膿血白屬寒宜溫中暢氣紅屬熱宜涼血清降大法白痢用川朴二陳木香炮薑楂炭六曲等味紅痢用炒地榆炒槐花炒銀花炒荊芥赤苓楂炭紅曲炭木耳炭等味或有宜用雅連者其檳榔一味為後重必需之品六腑以通為用萬不可早澀若久延脫肛則正氣下陷可投固攝或桃花粥養胃氣兼止澀甚效更有用逆挽法者緣初起有表邪俠表早投寒涼以致胃陽遏伏脾氣不升勢成噤口則用逆挽法以升舉之兼表邪者溫而散之實土以堤之開溝以泄之愈之殊易也瘟疫隨時而異亦隨地而異非大熱即大寒然熱多而寒少此中天地泄厲之氣挾有毒氛由口鼻吸受用藥之法或大清或大瀉或大溫大散必參入解毒之方成方有普濟消毒飲玉樞丹行軍散等臨時酌用瘋癆臌隔實病難醫此古諺也瘋有專科痹無善法茲姑勿論臌病病原不一經豫治者有二一濕臌一氣臌也濕臌膚中蓄水遍體浮腫色黃而鮮明江湖醫生以刀針開泄其水始非不取快一時逮水再蓄聚則難治矣豫治界徑上王福官子水鼓已急腎囊如水泡小便捩轉投以扶土泄水不效繼專逐其水芫花甘遂大戟等品連服三劑水從小便泄遂霍然愈氣臌即單腹脹也單單腹脹倘無臍突青筋等敗象速投消補兼施溫腎扶陽之劑十可全八九倘投破氣消導之劑則無氣索矣隔病亦名關格謂內關外格食不得下也其反胃者朝食暮吐暮食朝吐亦關格之漸也不急治漸成隔其病之樞在胃肝木侮土上撑嘔吐者豫每以椒梅理中治之多效其破氣伐肝之品須慎用腹瀉有非痢非瀉下如煙灰水者不能納穀死不治嗜鴉片者曰煙漏亦死便血者大都痔血也勿論糞前糞後清血中濕熱可愈木耳生於濕地炒炭可以止血用治痔血頗效淋濁小便必痛頻通之五苓八正要藥也或挾花柳毒者須解毒溲血者將成血淋豫用虎杖散治愈多人肺癆將成未成必有留邪俟其發時宣其邪屢發而屢宣之或可救若不發時雖搜其邪無益也病邪未淨而早補是謂關門捉賊若不驅而出之後患正多在肺延為瘍病痢則成休息痢瘧早截則不久便發三陰瘧有時愈時發經二三年之久者正犯此病糞怪近時新有之病良由黴雨之後日蒸濕騰桑田糞毒隨氣而上升人往採桑毒由足受先發下腫次乃上行腹大面浮終見咳嗽一身盡黃治之非易方宜燥濕解毒之中加入煅皂礬末作丸每日服之可拔根倘有人合就送人其功非細厄忒逆一症平人常有非病也由肺胃之氣為寒氣或冷飲所遏冷氣欲入熱氣欲出互相抵觸故厄厄連聲而作也以熱湯大口頓飲之立己其久病正虛而厄者聲由丹田而上其厄低而長一聲之後良久再作此大虛將脫也不治同道張君息厄自投溫中散寒之劑不效招豫往診其厄急促連續不斷知發於上焦問其病由據述面西北風行急路口吸寒氣夜半口渴又飲冷茶遂厄豫云此肺氣為寒所襲胃為冷飲所遏肺胃之氣欲出寒氣欲入互相抵觸所致宜開泄其肺方用枇杷葉為君佐以桔梗香豉象貝牛蒡鬱金前胡等味略煎進之厄驟減越二日病轉甚又相邀視其舌尖絳液干駭甚視其方自加五味細辛乾薑麻黃等品蓋誤投辛溫以傷液五味以閉肺也因再投原法加入養液之品堅囑勿改未幾即痊痧子溫熱病也宜辛涼不宜辛溫宜甘寒不宜苦寒開手至終無甚變更不過涼藥之進退視熱勢之程度而定耳內實者通其便液虧者養其液凡西河柳防風荊芥細辛麻黃白芷之類皆在禁例石膏亦須慎用若用之必與薄荷同打衣被戒暖窗牖勿閉乳食禁止方用銀翹散舌尖絳加鮮地鮮姘沙參舌燥者藕汁蔗漿地栗蘆根茅根枇杷葉皆當用之品橘絡桔梗尤要幼稚之病大抵外感多而內傷少實熱多而虛寒少族子云之孫女年四歲本暑邪也似瘧狀面微赤表熱起伏豫診之投疏解已布㾦矣猶未透也病家以豫已赴添川邀他醫以為虛㾦也投藥相左熱陡增㾦立隱乃大驚子云親到埭相邀診之變未劇僅舌苔已灰黑捫之潤小水清長姑投芳香一劑病如故叩病狀其母云頃連作矢氣三乃按其腹哭而拒大便不行內實無疑矣為定雙解法垢大下㾦始透足再以輕透劑調之餘邪肅清而愈此稚年內外俱實之證也若拘小水清長為寒灰苔為濕而誤投溫燥之劑則津涸而昏厥矣且內垢不去㾦仍不能透足所謂揚湯止沸不如釜底抽薪者此類是也朱姓子年亦四齡表熱便泄醫數更無效乃邀豫診望其面㿠白無華所下青膩乃斷其為濕勝陽虛為定扶土益陽之劑佐以芳香疏化一劑見㾦瀉稍稀再劑㾦足瀉止續進和中健脾蘇胃之方調之而愈此病與華姓孫女之病以面色大使相反故用藥亦相反幼稚臟腑嬌嫩消化力弱故以乳汁養之能食則食宜早斷乳病人亦有宜乳者必其消化力乏津液內耗一則取其易消化而無渣滓一則取其滋潤而補津液也古諺云若要小兒安常帶三分飢與寒此不刊之論也乃為母者愛之過甚必然厚其衣被飽其飲食以致釀為溫熱病者比比皆是及既病矣又閉其窗牖下其帳帷抱持同眠意在勿令著風逼其出汗不知病之熱衣被之熱人氣之熱交蒸並灼而熱愈甚汗㾦愈不得透結果痰稠氣急變成急驚角弓反張而死豫妗氏屢産屢殤正犯此病所生女皆長成無病以其不若男孩之姑息而聽其飢寒也此亦可以悟其故矣奈妗氏狃於積習終於不悟愛之適以殺之安得大雄氏廣長舌喚醒天下婦女也哉肥人陽虛多濕瘦人陰虛多火多火者色蒼多濕者色白其淡紅而微黃者正色也豫見有善用香燥者動手即寫朴朮不顧人之陰虛陽虛也不知濕病無死法既如上述而火則其變最速倘誤投香燥每致液涸舌燥指捫之如砂石須大劑滋潤或可挽救若至舌短難伸則木已燒炭不可救矣其症必見循衣摸床撮空理線病家以為猴精作怪虛擲金錢卒至人財兩失吾見實多迷信難破無可如何也醫家治病萬勿危詞駭主人病人前更要婉言慰之豫見有等醫師專好危言恫嚇以致病家不惜重金召巫建醮喧嚷終宵人多聲雜香煙濁氣臭穢逼人病人尚有知覺豈不擾神明而益其病乎吳俗信鬼到處皆然鄉村尤甚如見有神昏譫語之象便認為鬼祟起課召巫齋神祭鬼動費巨金未服湯藥已築債臺良可憫矣亦有起病之後專信巫覡及至請醫病已阽危多致不救有等病家就商於醫萬勿加以贊否贊之則損已德否之則招衆怨我盡我心由他而已然醫亦有藉此卸責者既無起死回生之能免招庸醫殺人之謗亦藏拙之一道也師巫邪術何知藥性病家有向之乞仙方者信口開河兒戲人命醫師竭力挽之而不足師巫一言敗之而有餘有地方之責者奈何聽其流毒社會耶治貧家之病易治富室之病難力食小民請醫不易非有大變不輕易也富家則不然病勢方張急求速效一劑無功即易他醫醫既數易方亦多疑議熱議涼畏首畏尾及起變波議論蜂起服藥打針中西雜進如是死者十人而九金錢萬能反以速死可不戒哉病家請醫必所素信宜令一人獨任倘請醫多人言龐意雜甲欲投涼乙云宜熱兩折其中不寒不熱此為疲藥安能愈疾效則居功不效卸責更有一般非族即戚指東話西假充明白不問病情徒議藥力醫非老練必亂心曲動而招尤不如謝絶治病要仗精神倘醫師身體欠佳或有心事切勿應診倘病者尋常小恙自有常軌若遇險症則精神既疲心思不靈用藥安能入級不如早卸仔肩為妙無病眼藥久而增氣偏勝致患諱疾忌醫邪必深入久延痼疾二者皆非也藥者所以補偏救弊也病來則藥病去則已不必多服以傷胃氣病後當以飲食調養飲食者無上之妙藥也世有終身不服藥而無病者寧有終身服藥不進飲食可以生存者乎此亦可以悟其故矣內外俱實者責其實內外俱虛者調其中內虛外實者責其實內實外虛者責其實責其實者汗之下之也調其中者扶土蘇胃培後天資生之本也煎藥之法上焦表散之劑取氣不取味宜略煎中下焦藥取味不取氣宜濃煎經所謂上焦如霧中焦如漚下焦如瀆者即形容其意也此等文字無書不載無人不談而醫師往往忽略臨時忘囑以致治不見效反疑藥誤其實煎未合法也天下事有視若細微實關重要者此類是也煎藥宜炭火鄉農往往以梗柴煎之火烈而水易干藥性反不易出也即表散劑亦非所宜近更有用洋爐子者便則便矣其如藥性難出何用藥有引子或引入某經或引之透表亦似細微而關重要者凡植物萌芽皆有透發之能取其意也如新荷蘆苟二青稻葉等是凡花露俱涼而能散以取露之法賴蒸氣上騰下滴為露有云騰致雨之意西瓜翠衣治暑邪以皮達皮且合時令而同氣相應也制炒之法或可取其和緩藥性或取其互助功能或為節制之師或賴引導之力皆有古法可宗研調磨沖全其力也先煎後下合其性也有等藥夥不究病情為人開方或藥味多至二十餘品或一方兼用三四古方如行軍不知敵人之所在多發幾路必有一遇病家説病討藥利其便宜店中意在招徠逢迎主顧何其重金錢而輕生命耶豫願其有則改之亦積德之一道也服藥之法無論何病總以空腹為宜俾藥汁入胃無所障礙得以即時輸化見效乃速凡表散之劑宜乘熱飲倘冷而再溫則香已散氣已泄必無效矣若藥已涼須飲熱湯以助其汗亦補救法也至於熱藥冷飲冷藥熱飲有從治之意讀古籍自知表熱起伏者熱來時不可服藥服則熱反熾或嘔逆者須俟其熱衰進之或服於熱未來時一則迎其機而導之一則乘其退而擊之也病房宜通空氣被褥衣服與平人同萬勿過暖病家狃於積習往往閉窗厚被試令無病之人當之能不受熱而煩躁乎且一遇神昏閉厥床前遍布健男意在嚇鬼熱氣薰蒸片刻難忍豈非速其死乎醫者於此等處須反復開導房內只許兩人開其窗薄其衣否則治雖合法難見效也豫七世祖爾昌公得消渴疾赴蘇求葉天土先生診治以城鄉不便賃屋寓蘇八世祖一匡公亦留蘇陪焉葉診月餘忽謝不敏叩其故云病已不救由於開手數方用之太早力自引咎一匡公與葉本世交勿怪也古人存心忠厚一則不諱其過一則能容其過君子之過如日月之食宜葉公之名重當時澤流後世也蘇州某醫名重一時吾鄉王生慕其名往受業一日從師出診師口道而生筆揮藥與病左生筆稍停師促之乃書及歸問師師亦自知藥誤矣翌日再往病稍重及書方則昨日之誤藥赫然首列而倍重焉生疑聽未確也停筆不書師口誦而促之生仍搖筆不遽下師怒之以目口道其藥聲益厲生不得己書焉歸又請問師師曰前已誤矣設更原法則自證其誤而豫名損矣所以重量倍前者令其不及更醫欲速之死也設易醫而識豫破綻則豫名從此敗矣為保全名譽計不得不忍而出此耳生聆之默然有頃拂袖竟歸終身不復業醫此先姑丈蔡叔初公為豫言吾鄉王對揚先生名醫也有王一帖之名一日乘舟出診診畢歸已行十餘里矣其徒有疑問請教先生恍然悟藥之誤急命返掉抵病家問藥服末病家言已煎未服也先生命傾之另易一方與之一劑霍然先生與蘇某醫相較其賢不肖相去不何如哉外科之藥及牙痛疔瘡等一方既效同息皆靈乃世人往往矜為祕方不肯外傳察其義又非牟利寧破財施藥堅不授方此意牢不可破殊不知其是何居心也夫方既靈效正宜廣為傳流一則可以多救病人一則可以方不失傳功德無量豫以為不傳祕方其罪等於見死不救雖解囊施藥無功可言其心慳也吾原挾有靈方者竭力宣傳人得其方轉相授受愈人必多功德與自施者無異其心仁也豫治病何不録存方案自知學力譾陋不足示人也今因年老體衰就館埭川鄭氏生徒僅一人館政清間藉資休養擬不再應診矣乃親友不諒往往急舟相邀不得已為馮婦之行定期到蕩計一月中可得十八日之間課餘無事追憶所及率成此篇非敢自矜心得也聊以示及門諸子暨小兒起云俾知醫術之難工弗冒昧而從事云爾其間偶載病症詳言治法皆當時嘔心絞腦出之者非僅僅於古紙堆中按圖而索者也附最近醫案華上年咯血盈碗盈盆其勢頗盛厥後時發時止今屆暑熱外爍咳逆痰升西法打針僅止其血中醫投藥誤用清滋以致氣愈逆痰愈多高枕不得平臥胃氣索然按其脈濡數無力視其舌薄白膩苔此暑濕新病也急則治標當先化其暑濕川朴藿香桔梗橘紅橘絡杏仁雞蘇散白茯苓佩蘭豆豉前胡扁豆衣復診氣稍平咳已稀濕痰上泛胃氣未蘇再宗原法出入不必過事更張也白朮炒橘紅橘絡廣藿梗牛蒡桔梗薑朴赤白苓佩蘭前胡穀芽六一散野薔薇花三診諸恙皆平胃蘇能納差幸得奏膚功忽又急舟相邀察其神怠倦嗜臥間作囈語切其脈仍見濡數視其舌胖膩有加且胃氣索然加以作惡此濕邪瀰漫蒙其神明也既非熱灼膻中亦非痰迷心竅不過君主困於群小乾綱不能振作耳毋庸驚駭濕去自安焦茅朮新會皮桔梗滑石焦六曲生熟穀芽白朮炭茯苓生熟苡仁澤瀉廣藿梗杏仁四診胃健加餐諸恙悉蠲忽以行走赤日之下暑熱外灼陽絡由激動而傷咯血又作醫投清裡化瘀之劑業已血止多日而咳逆未已當此秋分大節將臨難保其早恙不發但肺家既有留邪正可迎機而導之譬之盜賊深匿則搜之良難竊發則捕之甚易也於朮炒橘紅橘絡大力子桑白皮炙生蛤殼杏仁象貝白茯苓桔梗前胡紫菀款冬花雞蘇散宋面目黧黑氣升莫制舉步則喘促脈浮而數按之豁然而空此下元虛極也症屬損怯豈可忽視青鉛海浮石旋覆花人參蘇子熟地代赫石五味子坎氣即臍帶之別名宋病本冬溫極尋常之病為疲藥所誤疏之不合法下之藥太輕輾轉兼旬以致熱漸入營神昏譫語舌尖干絳若再失治勢必液涸發狂亟滋其液下其垢內外交攻冀其垢去疹布方是生機鮮地鮮斛豆豉大力子銀花連翹元明粉瀉葉鮮沙參全瓜蔞桔梗雞蘇散茅根復診垢下熱退疹㾦遍布此得力於甘寒也咳嗽痰稀餘邪未淨防其死灰復燃切勿驟進穀食鮮地鮮沙參豆豉牛蒡銀花連翹川石斛雞蘇散桔梗橘紅光杏仁白茅根三診表熱已平早進糜粥葷腥以致熱象又熾晚有譫語舌根及心苔灰臍旁堅硬有形此宿垢未淨復得薪食而揚其波豫所以諄諄告誡者正防其食復耳幸液來涸即系生機不然殆矣鮮生地鮮金斛銀花連翹瀉葉全瓜蔞枳實杏仁桔梗橘絡四診所下之垢黑而臭極視其疹㾦有續布者倣佛灌漿此熱邪蘊毒外泄之徵表熱雖退咳嗽未已擬再肅清餘邪萬勿慮虛進食慎之慎之鮮地鮮斛豆豉銀花連翹川貝雞蘇散前胡杏仁桔梗橘絡五診諸恙皆平咳痰如沫俟其黃濃則痊矣豆豉桔梗前胡杏仁蔞皮橘紅橘絡牛蒡製半夏川貝母茯苓南沙參雞蘇散王表熱泄瀉旬余未已黃先生投攻劫之劑胸膺劇痛泄利轉盛此表邪失於疏散遏伏則痛下陷則利仿古逆挽法汗布則利稀痛緩矣葛根豆豉青蒿前胡黃芩新會皮桔梗藿梗茯苓六一散楊濕勝陽微胃失消化之權脾乏運輸之力匝月以來表熱綿綿不揚汗不克布面白無華胸痞腹脹醫師憒憒謬以硝黃攻其食積所下無非稀水一誤再誤而至於三脹勢愈攻愈甚而苦寒之性戕賊胃氣以致杏不恩納舌苔灰薄而潤脈象軟數不鼓若不亟救脾胃之陽勢必浮腫而敗矣肉桂熟附茅白朮乾薑川朴新會皮鹿角霜薑半夏老蘇梗廣藿香茯苓復診脹勢已松胃氣稍蘇表熱反揚此久遏之邪欲出也前法救其藥誤今再透其表邪兼分利其小水俾表裡之邪內外分消庶幾霍然乾薑熟附桂枝蘇梗防風藿香川朴腹皮陳皮赤苓車前澤瀉三診脹平腹軟大汗淋漓小水通暢舌灰全退白㾦遍布遏伏之邪業已宣泄殆盡矣蠻補非宜仍從中土立法望其胃氣克振方為穩當土炒白朮煨乾薑桂枝陳皮廣藿梗薑半夏北秫米砂仁穀芽野薔薇花右肝氣宿恙每逢大節必發撑脹嘔惡不能納食所吐皆酸苦膩涎木乘土為賊邪將來定有痛厥之慮治以平肝和胃暫安川椒炒烏梅炒制香附士炒白朮煨乾薑陳香櫞桂心醋炒青皮川連炒吳萸薑半夏瓦楞子煅老人夜間捕魚霜露寒濕日積月纍以致腹脹納減久延脹劇已成單腹脹重病大便不爽形容消瘦花甲以外之年中陽已餒勢難望其復振勉立溫運一法聊盡人事熟附子乾薑胡蘆巴茅朮赤白苓老桂木吳萸青陳皮川朴雞內金此病連診三次意愈後以貧困仍理舊業復脹而死錢濕熱醞釀延成滯下紅白錯雜脹痛後重日夜數十行醫投白頭翁湯病轉利姑和其氣血清其宿積切勿再進苦寒戕其胃氣致延噤口重症帶皮檳榔炒地榆白朮炭楂炭青皮陳皮煨木香炒槐花紅曲炭藿梗炙陳火腿骨玫瑰花穀芽錢秋燥驟加伏暑竊發牽引肝氣宿恙諸醫偏治氣分誤進燥烈之品以致攻撑脹痛嘔逆噦惡其苦萬狀幾無片刻寧息切其脈細澀右現小實視其舌乾燥微黃指捫之如砂皮此上有膠痰下有宿垢也若不急救其津何以止其噦若不涼鎮其肝何以平其逆姑試一劑得效再商雅梨汁左金丸鮮石斛知母全瓜蔞紫貝齒石決明鮮地川貝銀花連翹復診津回嘔止諸恙都平宿垢未蠲尚難拔其根株瀉葉全瓜蔞銀花連翹青蒿雅梨肉豆豉紫貝齒知母川貝桔梗碧玉散陸大實大熱神昏譫妄揚手擲足猶以厚被強覆之豈非速其死耶當臍堅硬如石力拒按摩齒有灰垢唇有血痕急以清瀉救之尚恐鞭長莫及耳生軍元明粉鮮地鮮斛鮮首烏辰砂拌帶心連翹羚羊角石決明豆豉銀花雪水梨汁另服至寶丹復診神呆不語手足之揮舞已止宿垢己下然按其腹力拒如故堅硬未減力叩其故據述昨日之藥僅服其半切囑之言竟充耳若不聞當機自誤尚有何説今既相邀勉宗原法防其痙厥之變原方去羚羊角右決明至寶舟易紫雪丹三診垢去津回倉廩已消烈焰神清語了宮城已解重圍如斯九死一生之病倘畏首畏尾者豈不誤其生命耶前師不設曲實之謀我來已是焦頭之客慮其死灰復燃再投清解鮮生地鮮石斛銀花連翹桔梗雅梨肉淡豆豉肥知母黃芩橘絡丹皮丁濕溫發於房事之後表熱不揚濕多熱少四肢寒涼腰痛如折舌苔薄灰口膩不渴宜下溫少陰外祛濕邪雙方兼顧熟附子桂枝細辛韭子巴戟鎖陽藿香蘇梗陳皮半夏佩蘭車前子復診諸恙向安舌苔灰膩有加胃氣杳不思納據述曾服某先生藥堅囑勿進溫熱連診五次以致漸不欲食日就困頓差幸尚無變症仍以原法挽之熟附子吳萸乾薑陳皮半夏韭子上肉桂研末作丸蘇梗藿梗川朴白朮炒穀芽野薔薇花三診胃納漸加舌灰未退原方去蘇梗藿香加杜仲熟地炭丸方製附子肉桂吳萸乾薑半夏陳皮韭子車前杜仲土炒於朮炒黨參砂仁以蓯蓉熟地煎濃汁泛丸日進三四錢程上年曾患黃道今感暑濕伏邪竊發寒熱間日汗不暢布面目微見黃色慮其舊恙復作宜疏和參以法降濕熱之品柴胡偎草果炒淡苓窄香制川軍六一散青蒿炒知母宋半夏佩蘭黑梔鮮佛手某濕溫表熱頗壯神煩胸悶懊膿不寧渴不多飲諧語模糊有汗漆漾病經西候以外誤服清涼之劑煩懊轉加自云熱極視其舌苔白尖絛望之似干指鋼之仍潤此病若投芳香化之早已痞布而解矣譬草堆熱氣鬱蒸以水澆之徙增其濕不能去熱設的之以火曝之以日濕熱雖去而草又慮其枯不若挑而鬆之則空氣通而濕熱去矣病情有可以物理參加如是如是廣蠢香嫩蘇梗宋半夏飛滑石桔梗佩蘭葉淡豆豉新會皮生米仁佛革復診神清熱減瘠布僅見頸項胸膺尚少此以涼藥遏伏一劑不能透足仍宗原法自入坦途前方加橘絡茯苓薄荷三診白瘠遍布如水晶色諸症悉退自云腹飢索食恐其反復且勿與之再宗原意出入廣茬梗佩蘭陳皮炒自術白茯苓通草宋半夏煎仁穀芽桔梗野薔蔽花六一散張調脾陽餒弱命火下衰納食不馨口淡無味大便泄瀉經久不愈良由歷年嗜酒積濕傷其脾陽近因暑濕內襲漬脾成利更以年事已衰腎陽不振譬如釜底乏薪火力式微不能腐熟水穀耳況多思多慮亦為傷脾之一從此戒酒恰養尚可引年製附子吳奠偎益智上炒於朮縮砂仁肉桂乾薑五味炒補骨脂獲苓積懼子楊右溫病久延業已疹布便解而內熱綿綿不斷舌光絳如柿津液之竭勢將口糜起腐此為溫熱傷陰病後失於調理一誤再誤漸延虛怯雖有良方恐難奏效楓斜白芍龜板南北沙參香穀芽主地甘草鱉甲麥冬烏梅肉另以楓斛代茶恣飲之復診津液稍潤舌光如故仍守原法望其納穀方是生機原方加米露研薔衍花仍以楓斜湯代茶三診津液已回內熱頗減既畏藥不肯服以楓斛湯常服可也此病若在膏粱之體或善操心機之人決無生理幸是農家作苦之人平素無恩無慮竟得漸愈
